server:
  port: 8080

spring:
  application:
    name: "babyshower"

  datasource:
    url: jdbc:postgresql://localhost:5432/babyshower
    username: postgres
    password: 123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  devtools:
    add-properties: false

management:
  endpoints:
    web:
      exposure:
        include: "health,prometheus"

cors:
  allowed-origins: "http://localhost:4200,http://localhost:8080"